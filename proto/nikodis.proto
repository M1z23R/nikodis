syntax = "proto3";

package nikodis;

option go_package = "github.com/M1z23R/nikodis/pkg/gen";

// --- Cache ---

service CacheService {
  rpc Set(SetRequest) returns (SetResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message SetRequest {
  string key = 1;
  bytes value = 2;
  optional uint64 ttl_seconds = 3;
}
message SetResponse {}

message GetRequest {
  string key = 1;
}
message GetResponse {
  bytes value = 1;
  bool found = 2;
}

message DeleteRequest {
  string key = 1;
}
message DeleteResponse {
  bool deleted = 1;
}

// --- Broker ---

service BrokerService {
  rpc Publish(PublishRequest) returns (PublishResponse);
  rpc Subscribe(stream SubscribeStream) returns (stream Message);
}

message PublishRequest {
  string channel = 1;
  bytes data = 2;
  optional uint64 ack_timeout_seconds = 3;
}
message PublishResponse {
  string message_id = 1;
}

enum DeliveryMode {
  DELIVERY_MODE_INDEPENDENT = 0;
  DELIVERY_MODE_EXCLUSIVE = 1;
}

message SubscribeInit {
  repeated string channels = 1;
  DeliveryMode delivery_mode = 2;
}

message SubscribeStream {
  oneof action {
    SubscribeInit init = 1;
    SubscribeRequest subscribe = 2;
    UnsubscribeRequest unsubscribe = 3;
    Ack ack = 4;
    Pause pause = 5;
    Resume resume = 6;
  }
}

message SubscribeRequest {
  string channel = 1;
}

message UnsubscribeRequest {
  string channel = 1;
}

message Ack {
  string message_id = 1;
}

message Pause {
  string channel = 1;
}

message Resume {
  string channel = 1;
}

message Message {
  string id = 1;
  string channel = 2;
  bytes data = 3;
  uint32 delivery_attempt = 4;
}
